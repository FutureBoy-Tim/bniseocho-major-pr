<!-- 검색엔진 사이트 소유 확인 (index.html과 동일 코드 박기) -->

<!-- Person 구조화 데이터는 JS가 멤버 정보 로드 후 동적 생성 (script id="personSchema") -->

<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js" defer></script>
<script src="assets/share-kit.js" defer></script>
<style>
:root{
  --bni-orange:#FF8200; --bni-orange-soft:#FFB763; --bni-orange-bg:#FFF4E5; --bni-orange-deep:#A95400;
  --bni-navy:#0E1F5C; --bni-navy-2:#1B3380; --bni-navy-3:#27408F;
  --ink:#0E1422; --ink-2:#3A435A; --ink-3:#6B7388; --ink-4:#9098AC;
  --line:#E5E8EF; --line-2:#F1F3F8; --bg:#FAFBFD; --paper:#FFFFFF;
  --shadow-sm:0 1px 2px rgba(14,31,92,.04), 0 4px 12px rgba(14,31,92,.04);
  --shadow-md:0 6px 24px rgba(14,31,92,.08), 0 1px 4px rgba(14,31,92,.06);
  --shadow-lg:0 24px 60px rgba(14,31,92,.18);
  --shadow-xl:0 40px 80px rgba(14,31,92,.22);
  --r-sm:8px; --r-md:14px; --r-lg:22px; --r-xl:28px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:"Pretendard Variable","Pretendard",-apple-system,BlinkMacSystemFont,system-ui,Roboto,"Helvetica Neue",Arial,"Noto Sans KR",sans-serif;color:var(--ink);background:var(--bg);line-height:1.55;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
img{max-width:100%;display:block}

/* ── Top bar ───────────────────────────── */
.topbar{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.86);backdrop-filter:saturate(160%) blur(14px);-webkit-backdrop-filter:saturate(160%) blur(14px);border-bottom:1px solid var(--line)}
.topbar-inner{max-width:1280px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:12px}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:-.01em}
.brand-mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--bni-orange),#FF6A00);display:grid;place-items:center;color:#fff;font-size:13px;font-weight:900;box-shadow:0 4px 12px rgba(255,130,0,.35)}
.brand-text{font-size:15px}
.brand-text small{display:block;font-size:11px;font-weight:600;color:var(--ink-3)}
.topbar-spacer{flex:1}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 14px;border-radius:999px;font-weight:600;font-size:13px;letter-spacing:-.01em;transition:all .14s; white-space:nowrap}
.btn-ghost{color:var(--ink-2)}
.btn-ghost:hover{background:var(--line-2);color:var(--ink)}
.btn-primary{background:var(--bni-navy);color:#fff}
.btn-primary:hover{background:var(--bni-navy-2);transform:translateY(-1px);box-shadow:0 6px 18px rgba(14,31,92,.25)}
.btn-orange{background:var(--bni-orange);color:#fff}
.btn-orange:hover{background:#FF6A00;transform:translateY(-1px);box-shadow:0 6px 18px rgba(255,130,0,.32)}
.btn-outline{background:#fff;color:var(--ink);border:1px solid var(--line)}
.btn-outline:hover{border-color:var(--bni-navy);color:var(--bni-navy)}

/* ── Hero ───────────────────────────── */
.hero{position:relative;background:radial-gradient(1100px 700px at 80% -20%, #1B3380 0%, #0E1F5C 50%, #08123E 100%);color:#fff;overflow:hidden}
.hero::before{content:"";position:absolute;inset:0;background:radial-gradient(900px 500px at 95% -10%, rgba(255,130,0,.4), transparent 60%), radial-gradient(700px 500px at -10% 110%, rgba(255,130,0,.18), transparent 60%);pointer-events:none}
.hero::after{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:42px 42px;mask-image:linear-gradient(180deg,#000 0%,transparent 100%);opacity:.5;pointer-events:none}
.hero-inner{position:relative;max-width:1280px;margin:0 auto;padding:48px 24px 80px;display:grid;grid-template-columns:1.15fr 1fr;gap:48px;align-items:center}
.crumb{font-size:11px;font-weight:700;letter-spacing:.08em;color:#A6B0CC;text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.crumb a{color:var(--bni-orange-soft);transition:opacity .15s}
.crumb a:hover{opacity:.7}
.crumb .sep{opacity:.4}
.feature-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:999px;background:linear-gradient(135deg,#FF8200,#FF5A00);color:#fff;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px;box-shadow:0 8px 20px rgba(255,90,0,.4)}
.feature-badge::before{content:"★"}
.profile-h1{font-size:clamp(30px,4.6vw,50px);line-height:1.06;letter-spacing:-.025em;font-weight:800;margin:0 0 14px}
.profile-h1 em{font-style:normal;background:linear-gradient(135deg,#FFB763,#FF8200);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.profile-sub{font-size:clamp(15px,1.5vw,18px);color:#D5DBEC;margin:0 0 24px;max-width:560px;line-height:1.55}
.profile-meta{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0 26px}
.profile-meta .pill{padding:6px 12px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);font-size:12px;font-weight:600;backdrop-filter:blur(6px)}
.profile-meta .pill.org{background:rgba(255,130,0,.18);border-color:rgba(255,130,0,.4);color:#FFD09A}
.profile-cta{display:flex;flex-wrap:wrap;gap:8px}
.profile-cta .btn-orange{box-shadow:0 12px 28px rgba(255,130,0,.34)}

/* Hero card stack — digital card 9:16 */
.hero-card-stack{position:relative;display:grid;place-items:center;min-height:420px}
.hero-card{position:relative;background:#fff;border-radius:24px;padding:6px;box-shadow:var(--shadow-xl),0 0 0 1px rgba(255,255,255,.1);transform:rotate(-2deg) translateZ(0);transition:transform .5s cubic-bezier(.2,.8,.2,1);max-width:300px;width:100%;cursor:zoom-in}
.hero-card:hover{transform:rotate(0deg) translateY(-4px) scale(1.02)}
.hero-card img{border-radius:20px;display:block;width:100%;aspect-ratio:9/16;object-fit:cover;background:#0E1F5C}

/* ── Quick info bar ───────────────────────────── */
.quickbar{background:#fff;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.quickbar-inner{max-width:1280px;margin:0 auto;padding:18px 24px;display:flex;flex-wrap:wrap;gap:14px 32px;align-items:center;justify-content:space-between}
.quick-stats{display:flex;flex-wrap:wrap;gap:32px}
.quick-stat{display:flex;align-items:center;gap:10px;font-size:13px}
.quick-stat .label{color:var(--ink-3);font-weight:600;font-size:11px;letter-spacing:.06em;text-transform:uppercase}
.quick-stat .value{color:var(--ink);font-weight:700;font-size:14px}
.quick-stat svg{color:var(--bni-orange);flex-shrink:0}

/* ── Sections ───────────────────────────── */
.wrap{max-width:1280px;margin:0 auto;padding:64px 24px 24px}
.section-head{display:flex;align-items:end;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:24px}
.section-head h2{margin:0;font-size:clamp(22px,2.4vw,30px);letter-spacing:-.02em;font-weight:800}
.section-head p{margin:6px 0 0;color:var(--ink-3);font-size:14px}
.eyebrow{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.1em;color:var(--bni-orange);text-transform:uppercase;margin-bottom:8px}

/* ── About + Side row ───────────────────────────── */
.row{display:grid;grid-template-columns:1.5fr 1fr;gap:28px;align-items:flex-start}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r-xl);padding:32px;box-shadow:var(--shadow-sm);transition:box-shadow .2s}
.card:hover{box-shadow:var(--shadow-md)}
.card .lead{color:var(--ink-3);font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin:0 0 12px}
.card h2{margin:0 0 8px;font-size:22px;letter-spacing:-.015em}
.card p{margin:0 0 12px;color:var(--ink-2);line-height:1.65}
.card p:last-child{margin-bottom:0}

.bullet-list{list-style:none;padding:0;margin:14px 0 0}
.bullet-list li{position:relative;padding:11px 0 11px 30px;border-bottom:1px solid var(--line-2);font-size:15px;color:var(--ink)}
.bullet-list li:last-child{border-bottom:none}
.bullet-list li::before{content:"";position:absolute;left:2px;top:18px;width:14px;height:14px;border-radius:50%;background:var(--bni-orange-bg);box-shadow:inset 0 0 0 3px var(--bni-orange)}
.referral-list li::before{background:#E8EEFF;box-shadow:inset 0 0 0 3px var(--bni-navy-3)}

.contact-card{display:grid;grid-template-columns:auto 1fr;gap:14px 18px;font-size:14px;margin-top:14px}
.contact-card dt{color:var(--ink-3);font-weight:800;letter-spacing:.08em;font-size:11px;text-transform:uppercase;align-self:center}
.contact-card dd{margin:0}
.contact-card dd a{color:var(--bni-navy);font-weight:700;border-bottom:1px solid transparent;transition:border .15s}
.contact-card dd a:hover{border-bottom-color:var(--bni-navy)}

/* ── Asset showcase (NEW LAYOUT with correct aspect ratios) ─── */
.showcase{margin-top:80px}
.showcase-head{display:flex;align-items:end;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:32px}
.showcase-head h2{margin:0;font-size:clamp(26px,3vw,36px);letter-spacing:-.025em;font-weight:800}
.showcase-head p{margin:8px 0 0;color:var(--ink-3);font-size:15px}

/* Top row: digital card (9:16) + infographic (1:1)
 * Column ratio 9:16 makes both heights equal */
.showcase-row{display:grid;gap:20px;margin-bottom:20px}
.showcase-row.top{grid-template-columns:9fr 16fr}
.showcase-row.bottom{grid-template-columns:1fr 1fr}

.spotlight{position:relative;background:#fff;border:1px solid var(--line);border-radius:var(--r-xl);overflow:hidden;transition:all .2s;display:flex;flex-direction:column}
.spotlight:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:#D7DDE9}
.spotlight-art{position:relative;background:#F4F6FB;overflow:hidden;display:grid;place-items:center;cursor:zoom-in}
.spotlight-art img{width:100%;height:100%;object-fit:contain;display:block;transition:transform .5s cubic-bezier(.2,.8,.2,1);background:#fff}
.spotlight:hover .spotlight-art img{transform:scale(1.03)}

/* Aspect ratios per asset type */
.spot-digital .spotlight-art{aspect-ratio:9/16}
.spot-digital .spotlight-art img{object-fit:cover}
.spot-info .spotlight-art{aspect-ratio:1/1}
.spot-info .spotlight-art img{object-fit:cover}
.spot-card .spotlight-art{aspect-ratio:16/9;background:#fff}
.spot-card .spotlight-art img{object-fit:contain;padding:8px}

.spotlight-tag{position:absolute;top:14px;left:14px;padding:5px 11px;border-radius:999px;background:rgba(0,0,0,.65);color:#fff;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;backdrop-filter:blur(8px);z-index:2}
.spotlight-zoom{position:absolute;top:14px;right:14px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.95);display:grid;place-items:center;box-shadow:0 4px 12px rgba(0,0,0,.15);opacity:0;transform:translateY(-4px);transition:all .2s;z-index:2;cursor:zoom-in}
.spotlight:hover .spotlight-zoom{opacity:1;transform:translateY(0)}

.spotlight-body{padding:18px 22px 18px;display:flex;flex-direction:column;gap:10px}
.spotlight-meta{flex:1}
.spotlight-title{margin:0;font-size:16px;font-weight:800;letter-spacing:-.01em}
.spotlight-desc{margin:4px 0 0;font-size:13px;color:var(--ink-3);line-height:1.5}
.spotlight-actions{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.spot-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:999px;font-size:12px;font-weight:700;transition:all .14s;cursor:pointer;border:none;line-height:1}
.spot-btn-primary{background:var(--bni-orange);color:#fff}
.spot-btn-primary:hover{background:#FF6A00}
.spot-btn-outline{background:var(--line-2);color:var(--ink-2)}
.spot-btn-outline:hover{background:#E5E8EF;color:var(--ink)}

.spotlight-empty{aspect-ratio:inherit;display:grid;place-items:center;color:var(--ink-3);text-align:center;padding:24px;background:repeating-linear-gradient(45deg,#F4F6FB 0 12px,#EDF0F7 12px 24px);font-size:13px;font-weight:600;height:100%}
.spotlight-empty .em-icon{width:38px;height:38px;border-radius:12px;background:#fff;display:grid;place-items:center;margin-bottom:10px;color:var(--ink-4)}

/* ── PPT Slide Viewer (NEW) ───────────────────────────── */
.slide-viewer{margin-top:80px;background:#fff;border:1px solid var(--line);border-radius:var(--r-xl);overflow:hidden;box-shadow:var(--shadow-md)}
.sv-head{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px;padding:30px 32px 22px;border-bottom:1px solid var(--line)}
.sv-head .sv-title h2{margin:6px 0 4px;font-size:24px;letter-spacing:-.02em}
.sv-head .sv-title p{margin:0;color:var(--ink-3);font-size:14px}
.sv-actions{display:flex;gap:6px;flex-wrap:wrap}

.sv-stage{position:relative;background:linear-gradient(135deg,#0B1849 0%,#1B3380 100%);aspect-ratio:16/9;display:grid;place-items:center;overflow:hidden}
.sv-stage img{max-width:100%;max-height:100%;width:100%;height:100%;object-fit:contain;display:block;background:#fff;transition:opacity .25s}
.sv-stage img.loading{opacity:.4}
.sv-empty{color:#A6B0CC;text-align:center;padding:40px;font-size:14px}
.sv-empty h3{margin:0 0 8px;color:#fff;font-size:18px;letter-spacing:-.01em}

.sv-nav-prev,.sv-nav-next{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;display:grid;place-items:center;font-size:20px;font-weight:300;backdrop-filter:blur(8px);transition:all .15s;border:1px solid rgba(255,255,255,.18);cursor:pointer;z-index:3}
.sv-nav-prev{left:18px}
.sv-nav-next{right:18px}
.sv-nav-prev:hover,.sv-nav-next:hover{background:rgba(0,0,0,.8);transform:translateY(-50%) scale(1.05)}
.sv-nav-prev:disabled,.sv-nav-next:disabled{opacity:.3;cursor:not-allowed;transform:translateY(-50%)}

.sv-counter{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#fff;padding:6px 14px;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:.04em;backdrop-filter:blur(8px);z-index:3}
.sv-fullscreen{position:absolute;top:18px;right:18px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;display:grid;place-items:center;font-size:14px;backdrop-filter:blur(8px);transition:all .15s;border:1px solid rgba(255,255,255,.18);cursor:pointer;z-index:3}
.sv-fullscreen:hover{background:rgba(0,0,0,.8)}

.sv-thumbs{padding:18px 24px;background:#FAFBFD;display:flex;gap:8px;overflow-x:auto;scroll-behavior:smooth;border-top:1px solid var(--line)}
.sv-thumbs::-webkit-scrollbar{height:6px}
.sv-thumbs::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
.sv-thumb{flex-shrink:0;width:120px;aspect-ratio:16/9;border-radius:8px;overflow:hidden;border:2px solid transparent;background:#fff;cursor:pointer;transition:all .15s;padding:0;position:relative}
.sv-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.sv-thumb:hover{transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.sv-thumb.active{border-color:var(--bni-orange);box-shadow:0 0 0 2px rgba(255,130,0,.2)}
.sv-thumb-num{position:absolute;top:4px;left:4px;background:rgba(0,0,0,.7);color:#fff;font-size:10px;font-weight:800;padding:2px 6px;border-radius:4px}

/* Fullscreen mode */
.slide-viewer.fullscreen{position:fixed;inset:0;z-index:200;border-radius:0;margin:0;display:flex;flex-direction:column;background:#08123E}
.slide-viewer.fullscreen .sv-head,.slide-viewer.fullscreen .sv-thumbs{background:#0E1F5C;color:#fff;border-color:rgba(255,255,255,.08)}
.slide-viewer.fullscreen .sv-head h2,.slide-viewer.fullscreen .sv-head p{color:#fff}
.slide-viewer.fullscreen .sv-stage{flex:1;aspect-ratio:auto}
.slide-viewer.fullscreen .sv-thumb{background:rgba(255,255,255,.06)}

/* ── Share & QR ───────────────────────────── */
.share-card{display:grid;grid-template-columns:auto 1fr;gap:24px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:var(--r-xl);padding:24px;margin-top:24px}
.share-qr{width:140px;height:140px;background:#fff;border:1px solid var(--line);border-radius:var(--r-md);padding:8px;display:grid;place-items:center}
.share-qr canvas, .share-qr img{width:100%;height:100%;display:block}
.share-info h3{margin:0 0 6px;font-size:18px;letter-spacing:-.01em}
.share-info p{margin:0 0 12px;color:var(--ink-3);font-size:14px}
.share-actions{display:flex;flex-wrap:wrap;gap:8px}

/* ── Pager ───────────────────────────── */
.pager{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:60px}
.pager a, .pager .ph{padding:22px 26px;background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);transition:all .18s;display:block;min-height:80px}
.pager a:hover{border-color:var(--bni-orange);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.pager small{display:block;color:var(--ink-3);font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.pager strong{display:block;margin-top:6px;font-size:15px;letter-spacing:-.01em;font-weight:700}
.pager .next{text-align:right}
.pager .ph{background:transparent;border:none;visibility:hidden}

/* ── Footer ───────────────────────────── */
footer{margin-top:80px;background:var(--bni-navy);color:#A6B0CC}
.foot-inner{max-width:1280px;margin:0 auto;padding:34px 24px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:14px;align-items:center}
.foot-brand{color:#fff;font-weight:700}
.foot-tag{font-size:12px}

/* ── Empty / Upcoming ───────────────────────────── */
.empty-page{max-width:560px;margin:80px auto;padding:48px 40px;text-align:center;background:#fff;border-radius:var(--r-xl);border:1px solid var(--line);box-shadow:var(--shadow-md)}
.empty-page h1{margin:0 0 12px;font-size:26px;letter-spacing:-.02em}
.empty-page p{color:var(--ink-3);margin:0 0 22px}
.empty-icon{width:64px;height:64px;border-radius:18px;background:var(--bni-orange-bg);display:grid;place-items:center;margin:0 auto 18px;color:var(--bni-orange)}

/* ── Lightbox ───────────────────────────── */
.lightbox{position:fixed;inset:0;background:rgba(8,12,30,.92);z-index:200;display:none;place-items:center;padding:24px;cursor:zoom-out;backdrop-filter:blur(8px)}
.lightbox.open{display:grid}
.lightbox img{max-width:min(1100px,95vw);max-height:90vh;border-radius:14px;box-shadow:0 40px 100px rgba(0,0,0,.7);cursor:default}
.lightbox-close{position:absolute;top:18px;right:18px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.1);color:#fff;display:grid;place-items:center;font-size:20px;border:1px solid rgba(255,255,255,.2);transition:background .15s;cursor:pointer}
.lightbox-close:hover{background:rgba(255,255,255,.2)}
.lightbox-caption{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);color:#fff;font-size:13px;font-weight:600;letter-spacing:.04em;background:rgba(0,0,0,.4);padding:8px 16px;border-radius:999px;backdrop-filter:blur(8px)}
.lightbox-actions{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);display:flex;gap:8px}

/* ── Toast ───────────────────────────── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bni-navy);color:#fff;padding:12px 20px;border-radius:999px;font-size:13px;font-weight:600;box-shadow:0 12px 32px rgba(14,31,92,.4);opacity:0;transition:all .25s;pointer-events:none;z-index:300}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Responsive ───────────────────────────── */
@media (max-width:1000px){
  .showcase-row.top{grid-template-columns:1fr}
  .showcase-row.bottom{grid-template-columns:1fr}
  .spot-digital .spotlight-art{aspect-ratio:9/16;max-height:600px}
  .sv-thumb{width:96px}
}
@media (max-width:880px){
  .hero-inner{grid-template-columns:1fr;gap:24px;padding:36px 16px 56px}
  .row{grid-template-columns:1fr}
  .topbar-inner{padding:12px 16px;gap:8px}
  .wrap{padding:48px 16px 16px}
  .quickbar-inner{padding:14px 16px}
  .quick-stats{gap:18px}
  .share-card{grid-template-columns:1fr;text-align:center}
  .share-qr{margin:0 auto}
  .pager{grid-template-columns:1fr}
  .pager .next{text-align:left}
  .sv-head{padding:22px 18px 16px}
  .sv-thumbs{padding:14px 18px}
  .sv-nav-prev,.sv-nav-next{width:40px;height:40px}
}
@media (max-width:560px){
  .profile-h1{font-size:30px}
  .feature-badge{font-size:10px}
  .card{padding:24px 22px}
  .topbar .btn-ghost{display:none}
}

/* ── Print ───────────────────────────── */
@media print{
  body{background:#fff}
  .topbar,.lightbox,.toast,.pager,footer,.profile-cta,.spotlight-zoom,.share-card,.sv-thumbs,.sv-nav-prev,.sv-nav-next,.sv-fullscreen,.sv-actions,.spotlight-actions{display:none !important}
  .hero{background:#0E1F5C !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;color:#fff}
  .hero-inner{padding:24px;page-break-inside:avoid}
  .card,.spotlight,.slide-viewer{box-shadow:none !important;page-break-inside:avoid}
  .showcase{margin-top:24px}
  .showcase-row{gap:12px}
}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="./">
      <span class="brand-mark">B</span>
      <span class="brand-text">서초 BNI 메이저<small>Member PR</small></span>
    </a>
    <span class="topbar-spacer"></span>
    <a class="btn btn-ghost" href="./">← 멤버 목록</a>
    <button class="btn btn-outline" id="printBtn" title="PDF로 저장">🖨 인쇄</button>
    <button class="btn btn-orange" id="shareBtn">📢 공유</button>
  </div>
</header>

<main id="main">
  <div class="empty-page"><h1>로딩 중…</h1><p>잠시만 기다려주세요.</p></div>
</main>

<footer>
  <div class="foot-inner">
    <div>
      <div class="foot-brand">서초 BNI 메이저 챕터</div>
      <div class="foot-tag">Givers Gain · Business Referral Organization</div>
    </div>
    <div class="foot-tag" id="updatedAt"></div>
  </div>
</footer>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="자료 크게 보기">
  <button class="lightbox-close" id="lightboxClose" aria-label="닫기">✕</button>
  <img id="lightboxImg" src="" alt="" />
  <div class="lightbox-actions" id="lightboxActions"></div>
  <div class="lightbox-caption" id="lightboxCaption"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast">복사되었습니다</div>

<!-- Schema.org structured data -->
<script type="application/ld+json" id="ldjson">{}</script>

<script>
const params = new URLSearchParams(location.search);
const memberId = params.get("id");
const $ = sel => document.querySelector(sel);

async function load(){
  const res = await fetch("data/members.json", {cache:"no-store"});
  const data = await res.json();
  $("#updatedAt").textContent = "마지막 업데이트 · " + (data.lastUpdated || "");
  const m = data.members.find(x => x.id === memberId);
  if(!m){ renderNotFound(); return; }
  if(!m.tagline && m.status === "upcoming"){ renderUpcoming(m); return; }
  window._currentMember = m;
  window._currentData = data;
  render(m, data);
  setupOG(m);
  setupSchema(m);
  setupLightbox();
  setupQR();
  await setupSlideViewer(m);
}

function renderNotFound(){
  document.title = "찾을 수 없음 · BNI 서초 메이저";
  $("#main").innerHTML = `
    <div class="empty-page">
      <div class="empty-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9 9 15 15M15 9 9 15"/></svg></div>
      <h1>대표님을 찾을 수 없습니다</h1>
      <p>잘못된 링크이거나, 아직 공개되지 않은 멤버일 수 있어요.</p>
      <a class="btn btn-primary" href="./">멤버 목록으로 돌아가기</a>
    </div>`;
}

function renderUpcoming(m){
  document.title = `${m.name} 대표 · 공개 예정 · BNI 서초 메이저`;
  $("#main").innerHTML = `
    <div class="empty-page">
      <div class="empty-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg></div>
      <h1>${m.name} 대표 · ${m.company}</h1>
      <p>곧 공개 예정입니다. 매주 한 명씩 자료가 업데이트되니 조금만 기다려주세요.</p>
      <p style="font-size:13px;background:var(--bni-orange-bg);color:var(--bni-orange-deep);padding:8px 14px;border-radius:999px;display:inline-block"><strong>${m.industry || "-"}</strong> · ${m.category || "-"}</p>
      <div style="margin-top:24px"><a class="btn btn-primary" href="./">멤버 목록으로 돌아가기</a></div>
    </div>`;
}

function render(m, data){
  document.title = `${m.name} 대표 · ${m.company} · BNI 서초 메이저`;

  // canonical URL 동적 갱신 (?id=)
  const canonical = document.getElementById("canonicalLink");
  if (canonical) canonical.href = `https://futureboy-tim.github.io/bniseocho-major-pr/member.html?id=${m.id}`;

  // JSON-LD Person 구조화 데이터 동적 생성 (구글이 인물·직책·전문분야 인식 → 검색 시 리치 결과)
  const personSchema = document.getElementById("personSchema");
  if (personSchema) {
    const memberUrl = `https://futureboy-tim.github.io/bniseocho-major-pr/member.html?id=${m.id}`;
    const imageUrl = m.assets?.infographic
      ? new URL(m.assets.infographic, location.href).toString()
      : "https://futureboy-tim.github.io/bniseocho-major-pr/assets/members/lee-woochang/infographic.png";
    personSchema.textContent = JSON.stringify({
      "@context": "https://schema.org",
      "@type": "Person",
      "name": m.name,
      "jobTitle": m.title || "대표",
      "worksFor": { "@type": "Organization", "name": m.company || "" },
      "description": m.tagline || "",
      "url": memberUrl,
      "image": imageUrl,
      "telephone": m.phone || undefined,
      "email": m.email || undefined,
      "address": m.address || undefined,
      "knowsAbout": m.expertise || [],
      "memberOf": {
        "@type": "Organization",
        "name": "BNI 서초 메이저 챕터",
        "url": "https://futureboy-tim.github.io/bniseocho-major-pr/"
      }
    });
  }

  const expertise = (m.expertise || []).map(x => `<li>${x}</li>`).join("");
  const referrals = (m.referralTargets || []).map(x => `<li>${x}</li>`).join("");
  const value = (m.valueProps || []).map(x => `<p>${x}</p>`).join("");

  const idx = data.members.findIndex(x => x.id === m.id);
  const prev = data.members[idx-1];
  const next = data.members[idx+1];
  const pagerHtml = `
    <nav class="pager" aria-label="이전/다음 멤버">
      ${prev ? `<a href="member.html?id=${prev.id}"><small>← 이전</small><strong>${prev.name} 대표 · ${prev.company}</strong></a>` : `<span class="ph"></span>`}
      ${next ? `<a class="next" href="member.html?id=${next.id}"><small>다음 →</small><strong>${next.name} 대표 · ${next.company}</strong></a>` : `<span class="ph"></span>`}
    </nav>`;

  const a = m.assets || {};

  const showcaseHtml = `
    <section class="showcase">
      <div class="showcase-head">
        <div>
          <span class="eyebrow">PR Assets</span>
          <h2>${m.name} 대표를 한 페이지로</h2>
          <p>각 자료를 클릭하면 크게 볼 수 있고, 다운로드 버튼으로 바로 받을 수 있습니다.</p>
        </div>
      </div>
      <div class="showcase-row top">
        ${spotlight("digital", "디지털 명함", "BNI 서초 공통 디지털 명함 포맷", a.digitalCard, "spot-digital", `${m.name}_digital-card.png`)}
        ${spotlight("info", "인포그래픽", "사업·해결책·리퍼럴 가이드를 한 페이지로", a.infographic, "spot-info", `${m.name}_infographic.png`)}
      </div>
      <div class="showcase-row bottom">
        ${spotlight("front", "실물 명함 · 앞면", "오프라인 미팅에서 건네는 명함 정면", a.cardFront, "spot-card", `${m.name}_card-front.png`)}
        ${spotlight("back", "실물 명함 · 뒷면", "연락처와 주소가 담긴 명함 뒷면", a.cardBack, "spot-card", `${m.name}_card-back.png`)}
      </div>
    </section>`;

  const slideViewerHtml = `
    <section class="slide-viewer" id="slideViewer">
      <div class="sv-head">
        <div class="sv-title">
          <span class="eyebrow">상세 소개 PPT</span>
          <h2>${m.name} 대표 · 슬라이드 뷰어</h2>
          <p>좌우 화살표 또는 키보드 ← → 로 슬라이드를 넘기세요. 첫 화면부터 차례로 볼 수 있습니다.</p>
        </div>
        <div class="sv-actions">
          ${a.presentation ? `<a class="btn btn-orange" href="${a.presentation}" download="${m.name}_상세PPT.pptx">📑 PPT 다운로드</a>` : ""}
          ${a.presentation ? `<a class="btn btn-outline" href="${a.presentation}" target="_blank" rel="noopener">새 탭 ↗</a>` : ""}
        </div>
      </div>
      <div class="sv-stage" id="svStage">
        <button class="sv-fullscreen" id="svFullscreen" title="전체화면 (F)">⛶</button>
        <button class="sv-nav-prev" id="svPrev" title="이전 (←)">‹</button>
        <button class="sv-nav-next" id="svNext" title="다음 (→)">›</button>
        <img id="svImg" src="" alt="" />
        <div class="sv-counter" id="svCounter">로딩…</div>
      </div>
      <div class="sv-thumbs" id="svThumbs"></div>
    </section>`;

  const shareHtml = `
    <section class="share-card">
      <div class="share-qr"><canvas id="qrcode"></canvas></div>
      <div class="share-info">
        <h3>이 분을 다른 모임·커뮤니티에 추천하고 싶다면</h3>
        <p>📢 공유 키트를 열면 채널별 공유 버튼, 4가지 톤의 메시지 템플릿, QR 다운로드까지 한 번에 사용할 수 있습니다.</p>
        <div class="share-actions">
          <button class="btn btn-orange" id="openShareKitMember">📢 공유 키트 열기</button>
          <button class="btn btn-primary" id="copyLink">🔗 링크 복사</button>
        </div>
      </div>
    </section>`;

  $("#main").innerHTML = `
    <section class="hero">
      <div class="hero-inner">
        <div>
          <div class="crumb"><a href="./">멤버 목록</a> <span class="sep">/</span> ${m.category || "BNI Major"} <span class="sep">/</span> No. ${String(m.order).padStart(2,"0")}</div>
          ${m.status === "featured" ? `<div class="feature-badge">FEATURED · ${data.lastUpdated || ""}</div>` : ""}
          <h1 class="profile-h1">${m.tagline || `${m.name} 대표`}</h1>
          <p class="profile-sub">${m.subTagline || ""}</p>
          <div class="profile-meta">
            <span class="pill org">${m.company}</span>
            <span class="pill">${m.title || "대표"} ${m.name}</span>
            ${m.industry ? `<span class="pill">${m.industry}</span>` : ""}
          </div>
          <div class="profile-cta">
            ${a.presentation ? `<a class="btn btn-orange" href="${a.presentation}" download="${m.name}_상세PPT.pptx">📑 상세 PPT 다운로드</a>` : ""}
            ${m.phone ? `<a class="btn btn-primary" href="tel:${m.phone.replace(/[^0-9]/g,'')}">📞 ${m.phone}</a>` : ""}
            ${m.email ? `<a class="btn btn-ghost" style="color:#fff;background:rgba(255,255,255,.1)" href="mailto:${m.email}">✉️ ${m.email}</a>` : ""}
          </div>
        </div>
        ${a.digitalCard ? `<div class="hero-card-stack"><figure class="hero-card" data-zoom="${a.digitalCard}" data-caption="${m.name} 대표 · 디지털 명함" data-download="${a.digitalCard}"><img src="${a.digitalCard}" alt="${m.name} 대표 디지털 명함" /></figure></div>` : ""}
      </div>
    </section>

    <div class="quickbar">
      <div class="quickbar-inner">
        <div class="quick-stats">
          ${m.industry ? quickStat("briefcase", "업종", m.industry) : ""}
          ${m.category ? quickStat("tag", "분야", m.category) : ""}
          ${m.publishedAt ? quickStat("calendar", "공개일", m.publishedAt) : ""}
          ${m.address ? quickStat("pin", "오피스", m.address) : ""}
        </div>
      </div>
    </div>

    <div class="wrap">
      <div class="row">
        <article class="card">
          <p class="lead">About</p>
          <h2>${m.tagline || `${m.name} 대표`}</h2>
          ${value || `<p>${m.subTagline || ""}</p>`}
          ${expertise ? `<p class="lead" style="margin-top:26px">전문 분야</p><ul class="bullet-list">${expertise}</ul>` : ""}
        </article>

        <aside style="display:flex;flex-direction:column;gap:20px">
          <article class="card">
            <p class="lead">Referral Guide</p>
            <h2>이런 분을 소개해주세요</h2>
            ${referrals ? `<ul class="bullet-list referral-list">${referrals}</ul>` : "<p>준비중</p>"}
          </article>

          <article class="card">
            <p class="lead">Contact</p>
            <h2>연락처</h2>
            <dl class="contact-card">
              ${m.phone ? `<dt>M</dt><dd><a href="tel:${m.phone.replace(/[^0-9]/g,'')}">${m.phone}</a></dd>` : ""}
              ${m.email ? `<dt>E</dt><dd><a href="mailto:${m.email}">${m.email}</a></dd>` : ""}
              ${m.address ? `<dt>A</dt><dd>${m.address}</dd>` : ""}
            </dl>
          </article>
        </aside>
      </div>

      ${showcaseHtml}
      ${slideViewerHtml}
      ${shareHtml}
      ${pagerHtml}
    </div>
  `;

  // Wire share card
  const url = location.href;
  $("#copyLink")?.addEventListener("click", ()=>copy(url, "링크가 복사되었습니다"));
  $("#openShareKitMember")?.addEventListener("click", ()=>{
    if(!window.ShareKit) return;
    const chapter = location.origin + location.pathname.replace(/[^/]*$/,"");
    ShareKit.open({ mode:"member", member:m, data, url, chapterUrl:chapter });
  });
}

function quickStat(icon, label, value){
  const icons = {
    briefcase:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
    tag:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M20.59 13.41 12 22l-9-9V3h10l8.59 8.59a2 2 0 0 1 0 2.82Z"/><circle cx="7.5" cy="7.5" r="1.5"/></svg>',
    calendar:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>',
    pin:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 22s7-7.5 7-13a7 7 0 1 0-14 0c0 5.5 7 13 7 13Z"/><circle cx="12" cy="9" r="2.5"/></svg>'
  };
  return `<div class="quick-stat">${icons[icon]||""}<div><div class="label">${label}</div><div class="value">${value}</div></div></div>`;
}

function spotlight(kind, title, desc, src, cls, downloadName){
  if(src){
    return `
      <figure class="spotlight ${cls}">
        <div class="spotlight-art" data-zoom="${src}" data-caption="${title}" data-download="${src}">
          <span class="spotlight-tag">${title}</span>
          <span class="spotlight-zoom"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5M11 8v6M8 11h6"/></svg></span>
          <img src="${src}" alt="${title}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'spotlight-empty\\'><div class=\\'em-icon\\'>📭</div>이미지를 불러올 수 없습니다</div>'" />
        </div>
        <figcaption class="spotlight-body">
          <div class="spotlight-meta">
            <h3 class="spotlight-title">${title}</h3>
            <p class="spotlight-desc">${desc}</p>
          </div>
          <div class="spotlight-actions">
            <a class="spot-btn spot-btn-primary" href="${src}" download="${downloadName||''}">⬇ 다운로드</a>
            <button class="spot-btn spot-btn-outline" data-zoom="${src}" data-caption="${title}">🔍 크게 보기</button>
          </div>
        </figcaption>
      </figure>`;
  }
  return `
    <figure class="spotlight ${cls}">
      <div class="spotlight-art">
        <div class="spotlight-empty">
          <div class="em-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 16l5-5 4 4 3-3 6 6"/></svg></div>
          ${title}<br/><small style="font-weight:500;color:var(--ink-3);font-size:11px">곧 업데이트됩니다</small>
        </div>
      </div>
      <figcaption class="spotlight-body">
        <div class="spotlight-meta">
          <h3 class="spotlight-title">${title}</h3>
          <p class="spotlight-desc">${desc}</p>
        </div>
        <div class="spotlight-actions">
          <span style="padding:7px 12px;border-radius:999px;background:var(--line-2);font-size:12px;font-weight:700;color:var(--ink-3)">준비중</span>
        </div>
      </figcaption>
    </figure>`;
}

function setupOG(m){
  const a = m.assets || {};
  const title = `${m.name} 대표 · ${m.company} · BNI 서초 메이저`;
  const desc = (m.tagline || "") + (m.subTagline ? " — " + m.subTagline : "");
  $("#ogTitle").setAttribute("content", title);
  $("#ogDesc").setAttribute("content", desc);
  if(a.digitalCard){
    const abs = new URL(a.digitalCard, location.href).toString();
    $("#ogImage").setAttribute("content", abs);
  }
}

function setupSchema(m){
  const ld = {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": m.name,
    "jobTitle": m.title || "대표",
    "telephone": m.phone || undefined,
    "email": m.email || undefined,
    "worksFor": { "@type": "Organization", "name": m.company },
    "memberOf": { "@type": "Organization", "name": "BNI 서초 메이저 챕터" },
    "description": m.tagline || ""
  };
  $("#ldjson").textContent = JSON.stringify(ld, null, 2);
}

function setupLightbox(){
  const lb = $("#lightbox"), lbImg = $("#lightboxImg"), lbCap = $("#lightboxCaption"), lbActions = $("#lightboxActions");
  document.querySelectorAll("[data-zoom]").forEach(el=>{
    el.addEventListener("click", e=>{
      // Don't trigger if clicking a download button inside
      if(e.target.closest("[download]") && !e.target.matches("[data-zoom]")) return;
      e.preventDefault();
      e.stopPropagation();
      lbImg.src = el.dataset.zoom;
      lbImg.alt = el.dataset.caption || "";
      lbCap.textContent = el.dataset.caption || "";
      lbActions.innerHTML = el.dataset.download
        ? `<a class="btn btn-orange" href="${el.dataset.download}" download>⬇ 다운로드</a>`
        : "";
      lb.classList.add("open");
      document.body.style.overflow = "hidden";
    });
  });
  const close = ()=>{ lb.classList.remove("open"); document.body.style.overflow = ""; };
  $("#lightboxClose").addEventListener("click", close);
  lb.addEventListener("click", e=>{ if(e.target === lb) close(); });
  document.addEventListener("keydown", e=>{ if(e.key === "Escape" && lb.classList.contains("open")) close(); });
}

function setupQR(){
  const canvas = $("#qrcode");
  if(!canvas || !window.QRCode) return;
  QRCode.toCanvas(canvas, location.href, {margin:1,width:280,color:{dark:"#0E1F5C",light:"#FFFFFF"}}, ()=>{});
}

// ── PPT Slide Viewer ─────────────────────────────
async function setupSlideViewer(m){
  const stage = $("#svStage"), img = $("#svImg"), counter = $("#svCounter"),
        prev = $("#svPrev"), next = $("#svNext"), thumbs = $("#svThumbs"),
        fullBtn = $("#svFullscreen"), viewer = $("#slideViewer");
  if(!viewer) return;

  // Auto-detect slides: try slides/slide-01.png ... up to 99
  const base = `assets/members/${m.id}/slides/slide-`;
  const ext = ".png";
  const slides = [];
  for(let i = 1; i <= 99; i++){
    const num = String(i).padStart(2, "0");
    const url = `${base}${num}${ext}`;
    const ok = await imgExists(url);
    if(!ok) break;
    slides.push(url);
  }

  if(slides.length === 0){
    stage.innerHTML = `
      <div class="sv-empty">
        <h3>슬라이드 이미지가 아직 없습니다</h3>
        <p>PPT에서 "다른 이름으로 저장" → "PNG"로 슬라이드를 추출해 <code>assets/members/${m.id}/slides/</code> 폴더에 넣으면 자동 활성화됩니다.</p>
        ${m.assets?.presentation ? `<a class="btn btn-orange" style="margin-top:14px" href="${m.assets.presentation}" download>📑 PPT 다운로드</a>` : ""}
      </div>`;
    thumbs.style.display = "none";
    return;
  }

  let idx = 0;
  const total = slides.length;

  function go(i){
    idx = Math.max(0, Math.min(total - 1, i));
    img.classList.add("loading");
    img.src = slides[idx];
    img.onload = ()=>img.classList.remove("loading");
    counter.textContent = `${idx + 1} / ${total}`;
    prev.disabled = idx === 0;
    next.disabled = idx === total - 1;
    document.querySelectorAll(".sv-thumb").forEach((t, i2)=>{
      t.classList.toggle("active", i2 === idx);
      if(i2 === idx) t.scrollIntoView({behavior:"smooth", block:"nearest", inline:"center"});
    });
  }

  // Render thumbs
  thumbs.innerHTML = slides.map((s, i) =>
    `<button class="sv-thumb" data-i="${i}"><span class="sv-thumb-num">${i+1}</span><img src="${s}" alt="슬라이드 ${i+1}" loading="lazy" /></button>`
  ).join("");
  thumbs.querySelectorAll(".sv-thumb").forEach(t =>
    t.addEventListener("click", () => go(+t.dataset.i))
  );

  prev.addEventListener("click", ()=>go(idx - 1));
  next.addEventListener("click", ()=>go(idx + 1));

  // Keyboard navigation
  document.addEventListener("keydown", e=>{
    if(document.querySelector(".lightbox.open")) return;
    if(e.target.matches("input, textarea, select")) return;
    if(e.key === "ArrowLeft"){ go(idx - 1); }
    else if(e.key === "ArrowRight"){ go(idx + 1); }
    else if(e.key === "Home"){ go(0); }
    else if(e.key === "End"){ go(total - 1); }
    else if((e.key === "f" || e.key === "F") && !e.metaKey && !e.ctrlKey){ toggleFullscreen(); }
  });

  // Click on slide image to advance
  stage.addEventListener("click", e=>{
    if(e.target.closest("button")) return;
    if(e.target === img || e.target === stage){
      const rect = stage.getBoundingClientRect();
      const x = e.clientX - rect.left;
      if(x < rect.width / 2) go(idx - 1); else go(idx + 1);
    }
  });

  function toggleFullscreen(){ viewer.classList.toggle("fullscreen"); }
  fullBtn.addEventListener("click", toggleFullscreen);

  // Touch swipe
  let touchStartX = 0;
  stage.addEventListener("touchstart", e => { touchStartX = e.touches[0].clientX; });
  stage.addEventListener("touchend", e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if(Math.abs(dx) > 50){ go(idx + (dx < 0 ? 1 : -1)); }
  });

  go(0);
}

function imgExists(url){
  return new Promise(resolve => {
    const im = new Image();
    im.onload = ()=>resolve(true);
    im.onerror = ()=>resolve(false);
    im.src = url;
  });
}

async function copy(text, msg){
  try{ await navigator.clipboard.writeText(text); showToast(msg || "복사되었습니다"); }
  catch{ showToast("복사 실패. 직접 복사해주세요"); }
}

function showToast(msg){
  const t = $("#toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(showToast._t); showToast._t = setTimeout(()=>t.classList.remove("show"), 2000);
}

$("#printBtn").addEventListener("click", ()=>window.print());
$("#shareBtn").addEventListener("click", async ()=>{
  if(window.ShareKit && window._currentMember && window._currentData){
    const chapter = location.origin + location.pathname.replace(/[^/]*$/,"");
    ShareKit.open({ mode:"member", member:window._currentMember, data:window._currentData, url:location.href, chapterUrl:chapter });
    return;
  }
  const url = location.href;
  if(navigator.share){ try{ await navigator.share({title: document.title, url}); return; }catch{} }
  copy(url, "링크가 복사되었습니다");
});

});
